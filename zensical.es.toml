[project]
docs_dir = "docs/es"
site_dir = "site/es"

site_name = "ginga.org.br"

site_description = "Portal de documentación y especificaciones del middleware Ginga para TV Digital."
site_author = "Equipo Ginga.org.br"
extra_javascript = ["assets/javascripts/extra.js"]
extra_css = ["assets/stylesheets/extra.css"]

copyright = """
Copyright &copy; 2026 ginga.org.br team
"""

nav = [
  { "Home" = "index.md" },
  { "Estándares y Recomendaciones" = "standards.md" },
  { "Ginga-NCL" = [
    { "Sobre" = "gingancl/about.md" },
    { "Herramientas de Desarrollo" = "gingancl/development-tools.md" },
    { "NCL Handbook" = [
      { "Inicio" = "gingancl/handbook/home.md" },
      { "Versiones NCL" = "gingancl/handbook/ncl-versions.md" },
      { "Elementos Básicos" = [
        { "&lt;ncl&gt;" = "gingancl/handbook/ncl.md" },
        { "&lt;head&gt;" = "gingancl/handbook/head.md" },
        { "&lt;body&gt;" = "gingancl/handbook/body.md" },
        { "&lt;context&gt;" = "gingancl/handbook/context.md" },
        { "&lt;media&gt;" = "gingancl/handbook/media.md" },
        { "&lt;area&gt;" = "gingancl/handbook/area.md" },
        { "&lt;property&gt;" = "gingancl/handbook/property.md" },
        { "&lt;port&gt;" = "gingancl/handbook/port.md" },
        { "&lt;link&gt;" = "gingancl/handbook/link.md" },
        { "&lt;linkParam&gt;" = "gingancl/handbook/linkparam.md" },
        { "&lt;bind&gt;" = "gingancl/handbook/bind.md" },
        { "&lt;bindParam&gt;" = "gingancl/handbook/bindparam.md" },
        { "&lt;connectorBase&gt;" = "gingancl/handbook/connectorbase.md" },
        { "&lt;causalConnector&gt;" = "gingancl/handbook/causalconnector.md" },
        { "&lt;compoundCondition&gt;" = "gingancl/handbook/compoundcondition.md" },
        { "&lt;simpleCondition&gt;" = "gingancl/handbook/simplecondition.md" },
        { "&lt;compoundAction&gt;" = "gingancl/handbook/compoundaction.md" },
        { "&lt;simpleAction&gt;" = "gingancl/handbook/simpleaction.md" },
        { "&lt;compoundStatement&gt;" = "gingancl/handbook/compoundstatement.md" },
        { "&lt;assessmentStatement&gt;" = "gingancl/handbook/assessmentstatement.md" },
        { "&lt;attributeAssessment&gt;" = "gingancl/handbook/attributeassessment.md" },
        { "&lt;valueAssessment&gt;" = "gingancl/handbook/valueassessment.md" },
        { "&lt;connectorParam&gt;" = "gingancl/handbook/connectorparam.md" },
        { "&lt;meta&gt;" = "gingancl/handbook/meta.md" },
        { "&lt;metadata&gt;" = "gingancl/handbook/metadata.md" },
      ] },
      { "Elementos Complementarios" = [
        { "&lt;switch&gt;" = "gingancl/handbook/switch.md" },
        { "&lt;switchPort&gt;" = "gingancl/handbook/switchport.md" },
        { "&lt;mapping&gt;" = "gingancl/handbook/mapping.md" },
        { "&lt;defaultComponent&gt;" = "gingancl/handbook/defaultcomponent.md" },
        { "&lt;descriptorSwitch&gt;" = "gingancl/handbook/descriptorswitch.md" },
        { "&lt;defaultDescriptor&gt;" = "gingancl/handbook/defaultdescriptor.md" },
        { "&lt;bindRule&gt;" = "gingancl/handbook/bindrule.md" },
        { "&lt;ruleBase&gt;" = "gingancl/handbook/rulebase.md" },
        { "&lt;compositeRule&gt;" = "gingancl/handbook/compositerule.md" },
        { "&lt;rule&gt;" = "gingancl/handbook/rule.md" },
        { "&lt;descriptorBase&gt;" = "gingancl/handbook/descriptorbase.md" },
        { "&lt;descriptor&gt;" = "gingancl/handbook/descriptor.md" },
        { "&lt;descriptorParam&gt;" = "gingancl/handbook/descriptorparam.md" },
        { "&lt;regionBase&gt;" = "gingancl/handbook/regionbase.md" },
        { "&lt;region&gt;" = "gingancl/handbook/region.md" },
        { "&lt;transitionBase&gt;" = "gingancl/handbook/transitionbase.md" },
        { "&lt;transition&gt;" = "gingancl/handbook/transition.md" },
        { "&lt;importBase&gt;" = "gingancl/handbook/importbase.md" },
        { "&lt;importedDocumentBase&gt;" = "gingancl/handbook/importeddocumentbase.md" },
        { "&lt;importNCL&gt;" = "gingancl/handbook/importncl.md" },
      ] },
    ] },
  ] },
  { "Extensiones Ginga" = [
    { "Ginga-HTML5" = "gingahtml5/about.md" },
    { "Ginga-CC-WebServices" = "gingaccwebservices/about.md" },
    { "Ginga-J" = "gingaj/about.md" },
  ] },
]

[project.theme]
logo = "assets/favicon.png"
favicon = "assets/favicon.png"

language = "es"


features = [
  "announce.dismiss",
  "content.code.annotate",
  "content.code.copy",
  "content.code.select",
  "content.footnote.tooltips",
  "content.tabs.link",
  "content.tooltips",
  "navigation.indexes",
  "navigation.instant",
  "navigation.instant.prefetch",
  "navigation.path",
  "navigation.sections",
  "navigation.top",
  "navigation.tracking",
  "search.highlight",
  "toc.follow",
]

[[project.theme.palette]]
scheme = "default"
primary = "white"
toggle.icon = "lucide/moon"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
scheme = "slate"
primary = "black"
toggle.icon = "lucide/moon"
toggle.name = "Switch to light mode"

[project.extra]
alternate = [
  { name = "English", link = "../en/", lang = "en" },
  { name = "Português", link = "../pt/", lang = "pt" },
  { name = "Español", link = "../es/", lang = "es" },
]

[project.markdown_extensions.abbr]
[project.markdown_extensions.pymdownx.snippets]
auto_append = ["includes/abbreviations_es.md"]


[project.markdown_extensions.admonition]
[project.markdown_extensions.attr_list]
[project.markdown_extensions.def_list]
[project.markdown_extensions.footnotes]
[project.markdown_extensions.md_in_html]
[project.markdown_extensions.toc]
permalink = true
[project.markdown_extensions.pymdownx.arithmatex]
generic = true
[project.markdown_extensions.pymdownx.betterem]
[project.markdown_extensions.pymdownx.caret]
[project.markdown_extensions.pymdownx.details]
[project.markdown_extensions.pymdownx.emoji]
emoji_generator = "zensical.extensions.emoji.to_svg"
emoji_index = "zensical.extensions.emoji.twemoji"
[project.markdown_extensions.pymdownx.highlight]
anchor_linenums = true
line_spans = "__span"
pygments_lang_class = true
[project.markdown_extensions.pymdownx.inlinehilite]
[project.markdown_extensions.pymdownx.keys]
[project.markdown_extensions.pymdownx.magiclink]
[project.markdown_extensions.pymdownx.mark]
[project.markdown_extensions.pymdownx.smartsymbols]
[project.markdown_extensions.pymdownx.superfences]
custom_fences = [
  { name = "mermaid", class = "mermaid", format = "pymdownx.superfences.fence_code_format" },
]
[project.markdown_extensions.pymdownx.tabbed]
alternate_style = true
combine_header_slug = true
[project.markdown_extensions.pymdownx.tasklist]
custom_checkbox = true
[project.markdown_extensions.pymdownx.tilde]
